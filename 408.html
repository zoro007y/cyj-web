<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>408考研学习平台 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--accent:#007aff;--accent2:#5856d6;--border:rgba(0,0,0,.06);--shadow:0 1px 3px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);--shadow-lg:0 2px 8px rgba(0,0,0,.04),0 16px 40px rgba(0,0,0,.1);--radius:16px;--radius-lg:24px;--grad:linear-gradient(135deg,#007aff,#5856d6,#af52de);--font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','SF Pro Rounded','Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif;--ease:cubic-bezier(.25,.1,.25,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;line-height:1.5}
button{font-family:inherit;cursor:pointer}

/* ===== HOME ===== */
#home{min-height:100vh;background:linear-gradient(160deg,#0a0a1a 0%,#1a1a3e 40%,#0f0f2d 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 40px;position:relative;overflow:hidden}
#home::before{content:'';position:absolute;top:-200px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,122,255,.35) 0%,transparent 70%);pointer-events:none;filter:blur(60px);animation:floatA 8s ease-in-out infinite alternate}
#home::after{content:'';position:absolute;bottom:-200px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(175,82,222,.3) 0%,transparent 70%);pointer-events:none;filter:blur(60px);animation:floatB 10s ease-in-out infinite alternate}
@keyframes floatA{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,60px) scale(1.2)}100%{transform:translate(40px,-40px) scale(.9)}}
@keyframes floatB{0%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-80px) scale(1.1)}100%{transform:translate(-50px,30px) scale(1.15)}}
.home-glow{position:absolute;width:300px;height:300px;border-radius:50%;pointer-events:none;filter:blur(80px);animation:floatC 12s ease-in-out infinite alternate}
.glow-1{top:20%;left:10%;background:rgba(0,122,255,.2);animation-delay:0s}
.glow-2{top:60%;right:15%;background:rgba(255,149,0,.15);animation-delay:-4s}
.glow-3{bottom:10%;left:40%;background:rgba(52,199,89,.12);animation-delay:-8s}
@keyframes floatC{0%{transform:translate(0,0)}33%{transform:translate(30px,-50px)}66%{transform:translate(-40px,30px)}100%{transform:translate(20px,-20px)}}
.home-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:8px 18px;border-radius:100px;color:rgba(255,255,255,.7);font-size:.78rem;font-weight:600;margin-bottom:24px;border:1px solid rgba(255,255,255,.08);letter-spacing:.5px;text-transform:uppercase}
#home h1{color:#fff;font-size:clamp(2.2rem,6vw,3.2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:8px;background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#home>p{color:rgba(255,255,255,.5);font-size:1rem;margin-bottom:36px;font-weight:500}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:820px;width:100%}
.hc{background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius-lg);padding:24px 14px;text-align:center;cursor:pointer;transition:all .4s var(--ease);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}
.hc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%);opacity:0;transition:opacity .4s}
.hc:hover{transform:translateY(-4px) scale(1.02);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);box-shadow:0 20px 40px rgba(0,0,0,.3)}
.hc:hover::before{opacity:1}
.hc:active{transform:translateY(-1px) scale(.98)}
.hc .ico{font-size:1.9rem;margin-bottom:10px;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.hc h2{font-size:.95rem;color:#fff;margin-bottom:3px;font-weight:700;letter-spacing:-.01em}
.hc p{color:rgba(255,255,255,.45);font-size:.72rem;margin-bottom:10px;font-weight:400}
.hc .cnt{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.1);padding:4px 12px;border-radius:100px;font-size:.65rem;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.3px}
.hc-syl{background:linear-gradient(135deg,rgba(255,149,0,.12),rgba(255,59,48,.06));border:1px solid rgba(255,149,0,.25)}
.hc-syl:hover{background:linear-gradient(135deg,rgba(255,149,0,.18),rgba(255,59,48,.1));border-color:rgba(255,149,0,.4)}
.hc-syl h2{color:#ff9500}
.hc-syl .cnt{background:rgba(255,149,0,.2);color:#ff9500}

/* ===== SEARCH ===== */
.search-wrap{max-width:580px;width:100%;margin-bottom:28px;position:relative}
.search-wrap input{width:100%;padding:14px 20px 14px 48px;border:none;border-radius:14px;font-size:.95rem;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 2px 12px rgba(0,0,0,.2);outline:none;transition:all .3s var(--ease);color:#fff;font-weight:500}
.search-wrap input::placeholder{color:rgba(255,255,255,.35)}
.search-wrap input:focus{background:rgba(255,255,255,.12);box-shadow:0 2px 12px rgba(0,0,0,.2),0 0 0 2px rgba(0,122,255,.5)}
.search-wrap .s-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1rem;color:rgba(255,255,255,.4)}

/* ===== SUBJECT PAGE ===== */
#subject{display:none;height:100vh;flex-direction:column;background:var(--bg)}
.sub-top{background:rgba(255,255,255,.72);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:52px;flex-shrink:0;gap:12px}
.back{width:36px;height:36px;border-radius:10px;border:none;background:rgba(0,122,255,.1);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:var(--accent);transition:all .2s var(--ease);font-weight:600}
.back:hover{background:var(--accent);color:#fff}
.back:active{transform:scale(.88)}
.sub-top h2{font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.sub-body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.side{width:260px;background:rgba(255,255,255,.6);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:12px 10px;-webkit-overflow-scrolling:touch}
.side::-webkit-scrollbar{width:0}
.si{padding:11px 14px;border-radius:12px;cursor:pointer;transition:all .25s var(--ease);font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:12px;margin-bottom:2px;color:var(--text);letter-spacing:-.01em}
.si:hover{background:rgba(0,0,0,.04)}
.si.on{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(0,122,255,.3)}
.si .dot{width:10px;height:10px;border-radius:50%;background:#c7c7cc;flex-shrink:0;transition:all .25s var(--ease)}
.si.on .dot{background:rgba(255,255,255,.5);box-shadow:0 0 10px rgba(255,255,255,.4)}
.si .hot{background:#ff3b30;color:#fff;font-size:.6rem;padding:3px 8px;border-radius:6px;margin-left:auto;font-weight:700;letter-spacing:.3px}


/* Content */
.ct{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.ct::-webkit-scrollbar{width:0}
.cw{background:var(--card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);transition:transform .2s var(--ease)}
.cw:hover{transform:translateY(-2px)}
canvas{background:#fafafa;border-radius:var(--radius);display:block;margin:0 auto;width:100%;max-width:560px;border:1px solid rgba(0,0,0,.04)}
.br{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:4px 0}
.b{padding:9px 22px;border:none;border-radius:12px;cursor:pointer;font-size:.82rem;font-weight:600;color:#fff;transition:all .25s var(--ease);box-shadow:0 2px 8px rgba(0,0,0,.12);letter-spacing:.01em}
.b:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.b:active{transform:scale(.94)}
.b1{background:var(--accent)}.b2{background:#34c759}.b3{background:#ff9500}.b4{background:#ff3b30}.b5{background:#af52de}.b6{background:#5ac8fa}
.ib{background:linear-gradient(135deg,rgba(0,122,255,.05),rgba(88,86,214,.05));border-left:3px solid var(--accent);padding:14px 18px;border-radius:0 14px 14px 0;font-size:.84rem;line-height:1.7;color:var(--text)}
.ib b{color:var(--accent);font-weight:700}
.kp{background:rgba(255,204,0,.2);padding:2px 6px;border-radius:4px;font-weight:700;color:#a67c00}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--sub);padding:40px}
.welcome .ico{font-size:4.5rem;margin-bottom:20px;opacity:.15;filter:grayscale(.3)}
.welcome h3{font-size:1.15rem;color:var(--text);margin-bottom:6px;font-weight:700;letter-spacing:-.01em}
.welcome p{font-size:.88rem;color:var(--sub);font-weight:400}

/* Exam */
.ec{background:var(--card);border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow);border-left:4px solid #ff3b30;transition:transform .2s var(--ease)}
.ec:hover{transform:translateX(4px)}
.ec .yr{color:#ff9500;font-weight:800}
.ec .badge{background:#ff3b30;color:#fff;padding:2px 8px;border-radius:6px;font-size:.6rem;margin-left:6px;font-weight:700}
.ec .stem{margin:8px 0;padding:12px 16px;background:var(--bg);border-radius:12px;font-size:.88rem;line-height:1.7}
.ec .ta{color:var(--accent);cursor:pointer;font-size:.85rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;transition:opacity .2s}
.ec .ta:hover{opacity:.7}
.ec .ans{margin-top:8px;padding:12px 16px;background:linear-gradient(135deg,rgba(52,199,89,.08),rgba(52,199,89,.04));border-radius:12px;font-size:.85rem;display:none;line-height:1.7}
.ec .ans.show{display:block}

/* Syllabus */
.syl{background:var(--card);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.syl h3{font-size:1.1rem;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);font-weight:700}
.syl-item{margin-bottom:10px;padding:12px 16px;border-radius:12px;background:var(--bg);transition:all .2s var(--ease)}
.syl-item:hover{transform:translateX(4px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.syl-item.new{background:rgba(255,59,48,.06);border-left:3px solid #ff3b30}
.syl-item.new .syl-title{color:#ff3b30;font-weight:700}
.syl-item.hot{background:rgba(255,149,0,.06);border-left:3px solid #ff9500}
.syl-item.hot .syl-title{color:#ff9500;font-weight:700}
.syl-title{font-weight:700;color:var(--text);margin-bottom:4px;font-size:.92rem}
.syl-title .tag{font-size:.6rem;padding:2px 8px;border-radius:6px;color:#fff;margin-left:6px;font-weight:700;letter-spacing:.3px}
.syl-title .tag-new{background:#ff3b30}
.syl-title .tag-hot{background:#ff9500}
.syl-desc{font-size:.83rem;color:var(--sub);line-height:1.5}

/* Flashcard */
.fc-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding:24px 0}
.fc-card{width:100%;max-width:600px;height:340px;perspective:1000px;cursor:pointer}
.fc-inner{width:100%;height:100%;position:relative;transition:transform .6s var(--ease);transform-style:preserve-3d}
.fc-card.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 36px;text-align:center;box-shadow:var(--shadow-lg)}
.fc-front{background:linear-gradient(135deg,#007aff,#5856d6);color:#fff}
.fc-back{background:var(--card);color:var(--text);transform:rotateY(180deg);border:1px solid var(--border)}
.fc-front .fc-tag{font-size:.75rem;background:rgba(255,255,255,.15);padding:5px 16px;border-radius:100px;margin-bottom:20px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.fc-front h3{font-size:1.4rem;line-height:1.6;font-weight:600;max-width:480px}
.fc-back h4{font-size:1.1rem;color:var(--accent);margin-bottom:14px;font-weight:700}
.fc-back p{font-size:.95rem;line-height:1.8;color:var(--text);max-width:480px}
.fc-nav{display:flex;gap:12px;align-items:center}
.fc-counter{color:var(--sub);font-size:.88rem;font-weight:600}

/* Mock Exam */
.exam-q{background:var(--card);border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:14px}
.exam-q .q-num{color:var(--accent);font-weight:800;margin-bottom:8px;font-size:.85rem;letter-spacing:.3px}
.exam-q .q-stem{font-size:.92rem;line-height:1.7;margin-bottom:14px;font-weight:500}
.exam-q .q-opts label{display:flex;align-items:center;padding:12px 16px;margin-bottom:8px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s var(--ease);font-size:.9rem;font-weight:500;background:var(--card)}
.exam-q .q-opts label:hover{border-color:var(--accent);background:rgba(0,122,255,.03)}
.exam-q .q-opts input[type=radio]{margin-right:12px;accent-color:var(--accent);width:18px;height:18px}
.exam-q .q-opts label.correct{background:rgba(52,199,89,.08);border-color:#34c759;color:#1a7f37}
.exam-q .q-opts label.wrong{background:rgba(255,59,48,.06);border-color:#ff3b30;color:#c41e3a}
.exam-result{text-align:center;padding:40px;background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg)}
.exam-result .score{font-size:3.5rem;font-weight:800;color:var(--accent);letter-spacing:-.03em}
.exam-result p{color:var(--sub);margin-top:6px;font-weight:500}
.exam-result .btn{margin-top:20px}

@media(max-width:768px){
  .home-grid{grid-template-columns:repeat(2,1fr);max-width:440px}
  #home h1{font-size:2rem}
  .side{width:200px}
  .si{padding:10px 12px;font-size:.85rem}
  .fc-card{max-width:440px;height:280px}
  .fc-front h3{font-size:1.15rem}
}
@media(max-width:500px){
  .home-grid{grid-template-columns:1fr;max-width:280px}
  .side{display:none}
  .sub-body{flex-direction:column}
  .fc-card{max-width:320px;height:260px}
}

.mm-panel{margin:8px 0;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;}
.mm-hdr{cursor:pointer;padding:10px 16px;background:#f3f4f6;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.mm-hdr:hover{background:#e5e7eb;}
.mm-arrow{transition:transform .3s;font-size:10px;}
.mm-panel.open .mm-arrow{transform:rotate(180deg);}
.mm-body{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#1a1a2e;padding:0 12px;}
.mm-panel.open .mm-body{max-height:800px;padding:12px;}
.mm-body img{max-width:100%;display:block;margin:0 auto;}
.fc-filter{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;}
.ff{padding:6px 14px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#4b5563;font-size:13px;cursor:pointer;transition:.2s;}
.ff:hover{background:#f3f4f6;}
.ff.on{background:var(--c1);color:#fff;border-color:var(--c1);}
.fc-rand{background:var(--c1);color:#fff;border:none;padding:10px 28px;border-radius:25px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin:8px auto;display:block;}
.fc-rand:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(99,102,241,.4);}
.fc-nav{display:flex;justify-content:center;margin-top:12px;}

</style>
</head>
<body>

<!-- HOME -->
<div id="home">
<div class="home-glow glow-1"></div>
<div class="home-glow glow-2"></div>
<div class="home-glow glow-3"></div>
<div class="home-badge">🎓 27考研 · 408专业课</div>
<h1>408 学习平台</h1>
<p>交互动画 · 真题精选 · 零基础友好</p>
<div class="search-wrap">
<span class="s-icon">🔍</span>
<input type="text" placeholder="搜索知识点，例如：二叉树、TCP、Cache..." id="homeSearch" oninput="searchHome(this.value)">
</div>
<div class="home-grid" id="homeGrid">
<div class="hc" onclick="openSub('ds')"><span class="ico">📊</span><h2>数据结构</h2><p>树、图、排序、查找</p><span class="cnt">10个知识点</span></div>
<div class="hc" onclick="openSub('co')"><span class="ico">🖥️</span><h2>组成原理</h2><p>补码、Cache、CPU</p><span class="cnt">7个知识点</span></div>
<div class="hc" onclick="openSub('os')"><span class="ico">⚙️</span><h2>操作系统</h2><p>进程、内存、磁盘</p><span class="cnt">6个知识点</span></div>
<div class="hc" onclick="openSub('cn')"><span class="ico">🌐</span><h2>计算机网络</h2><p>TCP、DNS、路由</p><span class="cnt">8个知识点</span></div>
<div class="hc" onclick="openFlash()"><span class="ico">🃏</span><h2>知识卡片</h2><p>正面问题·背面答案</p><span class="cnt">闪卡复习</span></div>
<div class="hc hc-syl" onclick="openSyl()"><span class="ico">📋</span><h2>大纲对比</h2><p>27 vs 26 大纲变化</p><span class="cnt">新增考点</span></div>
</div>
</div>

<!-- SUBJECT -->
<div id="subject">
<div class="sub-top">
<button class="back" onclick="goHome()">←</button>
<h2 id="subTitle"></h2>
</div>
<div class="sub-body">
<div class="side" id="sidebar"></div>
<div class="ct" id="content"></div>
</div>
</div>

<!-- SYLLABUS -->
<div id="syllabus" style="display:none;height:100vh;flex-direction:column;background:var(--bg)">
<div class="sub-top">
<button class="back" onclick="goHome()">←</button>
<h2>📋 27考研408大纲 vs 26考研大纲</h2>
</div>
<div style="flex:1;overflow-y:auto;padding:20px" id="sylContent"></div>
</div>

<!-- FLASHCARD -->
<div id="flashcard" style="display:none;height:100vh;flex-direction:column;background:var(--bg)">
<div class="sub-top">
<button class="back" onclick="goHome()">←</button>
<h2>🃏 知识卡片复习</h2>
</div>
<div style="flex:1;overflow-y:auto;padding:20px" id="fcContent"></div>
</div>

<!-- MOCK EXAM -->


<script>
var sl=ms=>new Promise(r=>setTimeout(r,ms));
var rn=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function gc(id){var el=document.getElementById(id);return el?el.getContext('2d'):null;}
function rr(c,x,y,w,h,r,f,s){c.beginPath();if(c.roundRect)c.roundRect(x,y,w,h,r);else{c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}if(f){c.fillStyle=f;c.fill();}if(s){c.strokeStyle=s;c.stroke();}}
function tA(el){var a=el.nextElementSibling;a.classList.toggle('show');el.textContent=a.classList.contains('show')?'▼ 收起':'▶ 答案';}

// Search
var allItems=[];
var DATA={
ds:{t:'📊 数据结构',items:[
{id:'tree',n:'二叉树遍历',h:1,kw:'二叉树 前序 中序 后序 层序'},
{id:'rb',n:'红黑树/BST',h:1,kw:'红黑树 BST 二叉搜索'},

var fcIdx=0;
function openFlash(){
  document.getElementById('home').style.display='none';
  document.getElementById('flashcard').style.display='flex';
  fcIdx=0;fcFilter='all';renderFC();
}
function getFilteredCards(){
  if(fcFilter==='all')return FC_DATA;
  return FC_DATA.filter(function(c){return c.sub===fcFilter;});
}
function setFcFilter(f){
  fcFilter=f;
  document.querySelectorAll('.ff').forEach(function(el){el.classList.toggle('on',el.textContent===f||(f==='all'&&el.textContent==='全部'));});
  fcIdx=0;renderFC();
}
function renderFC(){
  var ct=document.getElementById('fcContent');
  var cards=getFilteredCards();
  if(!cards.length){ct.innerHTML='<p style="text-align:center;color:var(--sub);padding:40px">该科目暂无卡片</p>';return;}
  fcIdx=fcIdx%cards.length;
  var c=cards[fcIdx];
  var filterHTML='<div class="fc-filter">'+
    '<button class="ff on" onclick="setFcFilter(\'all\')">全部</button>'+
    '<button class="ff" onclick="setFcFilter(\'数据结构\')">数据结构</button>'+
    '<button class="ff" onclick="setFcFilter(\'组成原理\')">组成原理</button>'+
    '<button class="ff" onclick="setFcFilter(\'操作系统\')">操作系统</button>'+
    '<button class="ff" onclick="setFcFilter(\'计算机网络\')">计算机网络</button></div>';
  ct.innerHTML=filterHTML+
    '<div class="fc-wrap">'+
    '<div class="fc-card" id="fcCard" onclick="document.getElementById(\'fcCard\').classList.toggle(\'flipped\')">'+
    '<div class="fc-inner">'+
    '<div class="fc-front"><div class="fc-tag">'+c.sub+'</div><h3>'+c.q+'</h3></div>'+
    '<div class="fc-back"><h4>答案</h4><p>'+c.a+'</p></div>'+
    '</div></div>'+
    '<div class="fc-nav">'+
    '<button class="fc-rand" onclick="fcShuffle()">随机抽卡</button>'+
    '</div></div>';
}
function fcShuffle(){
  var cards=getFilteredCards();
  if(!cards.length)return;
  var fcEl=document.getElementById('fcCard');
  if(fcEl){fcEl.classList.remove('flipped');}
  setTimeout(function(){fcIdx=Math.floor(Math.random()*cards.length);renderFC();},200);
}
