<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>熊熊驿站</title>
<script src="https://cdn.bootcdn.net/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--pink:#FF6B9D;--glass:rgba(255,255,255,.72);--glass-border:rgba(255,255,255,.45);--shadow:0 8px 32px rgba(0,0,0,.08);--shadow-sm:0 2px 8px rgba(0,0,0,.06);--r:20px;--rs:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:linear-gradient(160deg,#FFF5F8 0%,#F0F4FF 50%,#F5FFF0 100%);background-attachment:fixed;padding-bottom:100px;min-height:100vh;color:#1C1C1E}

.hdr{background:var(--glass);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);padding:14px 20px;text-align:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--glass-border)}
.hdr img{width:100%;max-height:100px;object-fit:contain;border-radius:var(--r);margin-bottom:6px}
.hdr h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#FF6B9D,#FF8E53);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-r{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:4px}
.hdr-r span{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,107,157,.1);font-size:16px;cursor:pointer;transition:all .15s;touch-action:manipulation}
.hdr-r span:active{transform:scale(.85)}

.tabs{display:flex;padding:10px 16px 0;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:relative;z-index:2}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:var(--rs);background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.06);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;font-weight:500;color:#666;box-shadow:0 1px 4px rgba(0,0,0,.04);touch-action:manipulation}
.tab:active{transform:scale(.93)}
.tab.on{background:linear-gradient(135deg,#FF6B9D,#FF8E53);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(255,107,157,.35)}

.cl{padding:0 16px}
.cd{background:var(--glass);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--glass-border);touch-action:manipulation}
.cd.picked{opacity:.45}
.cd-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cd-corp{font-size:12px;font-weight:600;color:#8E8E93;display:flex;align-items:center;gap:6px}
.cd-corp .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;color:#fff}
.cd-sta{font-size:12px;color:#AEAEB2}
.cd-code{font-size:26px;font-weight:800;color:#FF6B9D;letter-spacing:1px;cursor:pointer;transition:all .15s}
.cd-code:active{opacity:.6}
.cd-code.picked{color:#C7C7CC;text-decoration:line-through;font-weight:500}
.cd-ft{display:flex;justify-content:flex-end;gap:6px;margin-top:8px}
.cd-ft button{background:none;border:none;font-size:13px;color:#FF6B9D;cursor:pointer;padding:6px 10px;border-radius:10px;font-weight:500;touch-action:manipulation;min-height:34px}
.cd-ft button:active{background:rgba(255,107,157,.1);transform:scale(.95)}
.cd-ft .del{color:#FF6B6B}
.btn-pk{background:linear-gradient(135deg,#34C759,#30B350)!important;color:#fff!important;border-radius:10px!important;padding:5px 10px!important;font-size:12px!important;font-weight:600!important;box-shadow:0 2px 8px rgba(52,199,89,.3)!important}

.bb{position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border-top:1px solid var(--glass-border);z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 30px rgba(0,0,0,.06)}
.bb button{width:100%;display:flex;flex-direction:column;align-items:center;padding:12px 0;font-size:12px;color:#FF6B9D;background:none;border:none;font-weight:700;touch-action:manipulation}
.bb button:active{transform:scale(.95)}
.bb .ic{font-size:28px;margin-bottom:3px;filter:drop-shadow(0 2px 4px rgba(255,107,157,.3))}

.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:9999;justify-content:center;align-items:center}
.mo.show{display:flex}
.mo-c{background:var(--glass);backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);border-radius:24px;padding:24px;width:88%;max-width:360px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);border:1px solid var(--glass-border)}
.mo-c h2{margin-bottom:16px;font-size:20px;font-weight:800}
.mo-c label{font-size:12px;color:#8E8E93;margin-bottom:5px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mo-c input,.mo-c textarea{width:100%;padding:12px 14px;border:none;border-radius:var(--rs);font-size:15px;margin-bottom:12px;background:rgba(0,0,0,.04);outline:none;transition:all .2s;font-family:inherit}
.mo-c input:focus{background:rgba(0,0,0,.06);box-shadow:0 0 0 3px rgba(255,107,157,.15)}
.mo-btns{display:flex;gap:10px;margin-top:6px}
.mo-btns button{flex:1;padding:13px;border-radius:var(--rs);border:none;font-size:16px;font-weight:600;touch-action:manipulation}
.mo-btns button:active{transform:scale(.97)}
.bc{background:rgba(0,0,0,.06);color:#1C1C1E}
.bs{background:linear-gradient(135deg,#FF6B9D,#FF8E53);color:#fff;box-shadow:0 4px 15px rgba(255,107,157,.35)}

.empty{text-align:center;padding:80px 20px;color:#AEAEB2}
.empty-ic{font-size:56px;margin-bottom:12px}

.ocr-load{display:none;margin:10px 16px;background:var(--glass);backdrop-filter:blur(20px);border-radius:var(--r);padding:20px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--glass-border)}
.ocr-load.show{display:block}
.sp{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,107,157,.2);border-top-color:#FF6B9D;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-load .st{margin-top:10px;font-size:14px;color:#8E8E93;font-weight:500}
.ocr-cancel{margin-top:10px;padding:8px 20px;border:none;border-radius:10px;background:rgba(0,0,0,.06);color:#666;font-size:13px;cursor:pointer}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.sc{background:linear-gradient(135deg,rgba(255,107,157,.08),rgba(255,142,83,.08));border-radius:var(--r);padding:16px;text-align:center;border:1px solid rgba(255,107,157,.1)}
.sc .n{font-size:30px;font-weight:800;background:linear-gradient(135deg,#FF6B9D,#FF8E53);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sc .l{font-size:12px;color:#8E8E93;margin-top:4px;font-weight:500}
.btn-cl{width:100%;padding:11px;border:1.5px solid #FF6B6B;border-radius:var(--rs);font-size:14px;color:#FF6B6B;background:rgba(255,107,107,.05);cursor:pointer;margin-top:10px;font-weight:600;touch-action:manipulation}
.btn-cl:active{background:rgba(255,107,107,.15);transform:scale(.98)}

.sp-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sp-btn{padding:5px 10px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:rgba(0,0,0,.03);font-size:12px;cursor:pointer;touch-action:manipulation;color:#666;transition:all .15s}
.sp-btn:active{transform:scale(.95);background:rgba(255,107,157,.1)}

.crp-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.crp-btn{padding:7px 14px;border-radius:var(--rs);border:1.5px solid rgba(0,0,0,.08);background:rgba(0,0,0,.03);cursor:pointer;touch-action:manipulation;transition:all .15s}
.crp-btn.on{background:linear-gradient(135deg,#FF6B9D,#FF8E53);border-color:transparent;box-shadow:0 4px 12px rgba(255,107,157,.3)}
.crp-t{font-size:13px;color:#666;font-weight:500}
.crp-t.on{color:#fff}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:99999;pointer-events:none;animation:ti .2s ease,to .3s ease 1.2s forwards;backdrop-filter:blur(10px)}
@keyframes ti{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes to{to{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
.cd.sel{border-color:#FF6B9D;box-shadow:0 0 0 2px rgba(255,107,157,.3)}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;transition:all .15s}
.chk.on{background:#FF6B9D;border-color:#FF6B9D;color:#fff}
.batch-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(40px);border-top:1px solid var(--glass-border);z-index:101;padding:12px 16px;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 30px rgba(0,0,0,.06)}
.batch-bar.show{display:flex;align-items:center;gap:8px}
.batch-bar .cnt{font-size:14px;font-weight:600;color:#333;flex-shrink:0}
.batch-bar .abtn{padding:8px 16px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.abtn-green{background:#34C759;color:#fff}
.abtn-red{background:#FF6B6B;color:#fff}
.abtn-gray{background:rgba(0,0,0,.06);color:#333}
</style>
</head>
<body>
<div class="hdr">
  <img src="header.png" alt="" onerror="this.style.display='none'">
  <h1>🐻 熊熊驿站 🐼</h1>
  <div class="hdr-r">
    <span onclick="toggleSelectMode()" id="selBtn">☑️</span>
    <span onclick="openStats()">📊</span>
    <span onclick="openSettings()">⚙️</span>
  </div>
</div>

<div id="listV">
  <input type="file" id="fi" accept="image/*" onchange="handleFile(event)" style="display:none">
  <div class="ocr-load" id="ocrLoad">
    <div class="sp"></div>
    <div class="st" id="ocrSt">加载中...</div>
    <button class="ocr-cancel" onclick="cancelOCR()">取消</button>
  </div>
  <div class="tabs" id="staTabs"></div>
  <div class="cl" id="cardList"></div>
</div>

<div class="batch-bar" id="batchBar">
  <span class="cnt" id="batchCnt">已选 0 项</span>
  <button class="abtn abtn-green" onclick="batchPickup()">✅ 批量已取</button>
  <button class="abtn abtn-red" onclick="batchDelete()">🗑️ 删除</button>
  <button class="abtn abtn-gray" onclick="batchShare()">📤 分享</button>
  <button class="abtn abtn-gray" onclick="exitSelectMode()">取消</button>
</div>

<div class="bb">
  <button onclick="document.getElementById('fi').click()"><span class="ic">📸</span>截图识别</button>
</div>

<div class="mo" id="modal">
  <div class="mo-c">
    <h2 id="mTitle">添加快递</h2>
    <label>取件码</label><input type="text" id="iCode" placeholder="例如：307-1-1009">
    <label>快递公司</label>
    <div class="crp-row" id="crpRow"></div>
    <label>驿站</label>
    <div class="sp-row" id="staPick"></div>
    <input type="text" id="iStation" placeholder="或手动输入驿站名">
    <div class="mo-btns"><button class="bc" onclick="closeModal()">取消</button><button class="bs" onclick="saveItem()">保存</button></div>
  </div>
</div>

<div class="mo" id="statsMo">
  <div class="mo-c">
    <h2>📊 数据概览</h2>
    <div id="statsCt"></div>
    <button class="btn-cl" onclick="cleanupPicked()">🗑️ 清理已取</button>
    <div class="mo-btns" style="margin-top:10px"><button class="bc" onclick="closeStats()">关闭</button></div>
  </div>
</div>

<div class="mo" id="setMo">
  <div class="mo-c">
    <h2>⚙️ 设置</h2>
    <label>驿站列表（每行一个）</label>
    <textarea id="iStas" rows="5" style="width:100%;padding:12px;border:none;border-radius:var(--rs);font-size:13px;background:rgba(0,0,0,.04);outline:none;font-family:inherit" placeholder="北门美食广场&#10;1栋快递服务中心&#10;食堂快递点"></textarea>
    <div style="font-size:11px;color:#BC8F8F;margin-top:-4px;margin-bottom:10px">可增删改，用于快捷选择和自动识别</div>
    <button onclick="exportData()" style="width:100%;padding:11px;border:1.5px solid #FF6B9D;border-radius:var(--rs);font-size:14px;color:#FF6B9D;background:rgba(255,107,157,.05);cursor:pointer;margin-bottom:10px;font-weight:600">📤 导出数据</button>
    <label>📥 导入数据</label>
    <textarea id="iImport" rows="2" style="width:100%;padding:12px;border:none;border-radius:var(--rs);font-size:12px;font-family:monospace;background:rgba(0,0,0,.04);outline:none" placeholder="粘贴导出的数据..."></textarea>
    <button onclick="importData()" style="width:100%;padding:11px;border:none;border-radius:var(--rs);font-size:14px;color:#fff;background:linear-gradient(135deg,#FF6B9D,#FF8E53);cursor:pointer;margin-top:6px;margin-bottom:10px;font-weight:600">📥 导入</button>
    <div class="mo-btns"><button class="bc" onclick="closeSettings()">取消</button><button class="bs" onclick="saveSettings()">保存</button></div>
  </div>
</div>

<script>
const CR={极兔:'#FF8C00',圆通:'#4169E1',中通:'#DC143C',韵达:'#8B4513',申通:'#DAA520',顺丰:'#2F4F4F',京东:'#DC143C',邮政EMS:'#228B22',菜鸟:'#FF8C00',德邦:'#4169E1',其他:'#BC8F8F'};
const COURIERS=['极兔','圆通','中通','韵达','申通','顺丰','京东','邮政EMS','菜鸟','德邦','其他'];

let items=JSON.parse(localStorage.getItem('puItems')||'[]');
let stations=JSON.parse(localStorage.getItem('puStas')||'["北门美食广场","1栋快递服务中心","食堂快递点","桂轩快递站","鸿欣超市","2栋快递服务中心","3栋快递服务中心","东门快递点","西门快递点","南门快递点"]');
let curTab='全部',editId=null,worker=null,curC='';
let selectMode=false,selected=new Set();

function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1600);}
function save(){localStorage.setItem('puItems',JSON.stringify(items));}
function saveStas(){localStorage.setItem('puStas',JSON.stringify(stations));}

function renderStaTabs(){
  const used=new Set(items.map(i=>i.station).filter(Boolean));
  const tabs=['全部',...stations.filter(s=>used.has(s))];
  document.getElementById('staTabs').innerHTML=tabs.map(s=>`<div class="tab${curTab===s?' on':''}" onclick="setStTab('${s.replace(/'/g,"\\'")}')">${s}</div>`).join('');
}
function setStTab(t){curTab=t;renderCards();}

function renderCrpRow(){
  document.getElementById('crpRow').innerHTML=COURIERS.map(c=>`<div class="crp-btn${curC===c?' on':''}" onclick="setCrp('${c}')"><span class="crp-t${curC===c?' on':''}">${c}</span></div>`).join('');
}
function setCrp(c){curC=curC===c?'':c;renderCrpRow();}

function renderStPick(){
  document.getElementById('staPick').innerHTML=stations.map(s=>`<div class="sp-btn" onclick="document.getElementById('iStation').value='${s.replace(/'/g,"\\'")}'">${s}</div>`).join('');
}

function openModal(id){
  editId=id||null;renderCrpRow();renderStPick();
  if(editId){
    const it=items.find(i=>i.id===id);
    if(!it)return;
    document.getElementById('mTitle').textContent='编辑快递';
    document.getElementById('iCode').value=it.code;
    curC=it.courier||'';
    document.getElementById('iStation').value=it.station||'';
  }else{
    document.getElementById('mTitle').textContent='添加快递';
    document.getElementById('iCode').value='';curC='';document.getElementById('iStation').value='';
  }
  renderCrpRow();
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function saveItem(){
  const code=document.getElementById('iCode').value.trim(),station=document.getElementById('iStation').value.trim();
  if(!code)return toast('请输入取件码');
  if(editId){
    const it=items.find(i=>i.id===editId);
    if(it){it.code=code;it.courier=curC;it.station=station;}
  }else{
    items.unshift({id:Date.now()+Math.floor(Math.random()*1000),code,courier:curC,station,time:new Date().toLocaleString('zh-CN'),pickedUp:false});
  }
  save();closeModal();renderCards();toast(editId?'已更新':'已添加');
}

function togglePicked(id){
  const it=items.find(i=>i.id===id);if(!it)return;
  it.pickedUp=!it.pickedUp;
  it.pickedUpTime=it.pickedUp?new Date().toLocaleString('zh-CN'):null;
  save();renderCards();toast(it.pickedUp?'已标记取件':'已取消');
}

function deleteItem(id){if(confirm('确定删除？')){items=items.filter(i=>i.id!==id);save();renderCards();toast('已删除');}}
function copyCode(c){navigator.clipboard.writeText(c).then(()=>toast('已复制：'+c)).catch(()=>toast('复制失败'));}

function cleanupPicked(){
  const n=items.filter(i=>i.pickedUp).length;
  if(!n)return toast('没有已取快递');
  if(!confirm('删除 '+n+' 条？'))return;
  items=items.filter(i=>!i.pickedUp);save();closeStats();renderCards();toast('已清理');
}

function toggleSelectMode(){
  selectMode=!selectMode;
  selected.clear();
  document.getElementById('batchBar').classList.toggle('show',selectMode);
  document.getElementById('selBtn').textContent=selectMode?'✕':'☑️';
  renderCards();
}
function exitSelectMode(){selectMode=false;selected.clear();document.getElementById('batchBar').classList.remove('show');document.getElementById('selBtn').textContent='☑️';renderCards();}
function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);document.getElementById('batchCnt').textContent='已选 '+selected.size+' 项';renderCards();}
function batchPickup(){
  if(!selected.size)return toast('请先选择快递');
  items.forEach(i=>{if(selected.has(i.id)){i.pickedUp=true;i.pickedUpTime=new Date().toLocaleString('zh-CN');}});
  save();exitSelectMode();renderCards();toast('已批量标记取件');
}
function batchDelete(){
  if(!selected.size)return toast('请先选择快递');
  if(!confirm('删除选中的 '+selected.size+' 条？'))return;
  items=items.filter(i=>!selected.has(i.id));save();exitSelectMode();renderCards();toast('已批量删除');
}
function batchShare(){
  if(!selected.size)return toast('请先选择快递');
  const shareItems=items.filter(i=>selected.has(i.id));
  const text=shareItems.map(i=>`${i.code} | ${i.courier||''} | ${i.station||''}`).join('\n');
  if(navigator.share){navigator.share({title:'我的取件码',text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>toast('已复制到剪贴板')).catch(()=>toast('复制失败'));}
}
function shareItem(code,courier,station){
  const text=`取件码：${code}\n快递公司：${courier||'未知'}\n驿站：${station||'未知'}`;
  if(navigator.share){navigator.share({title:'取件码',text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>toast('已复制取件码信息'));}
}

function renderCards(){
  let f=items;
  if(curTab!=='全部')f=f.filter(i=>i.station===curTab);
  renderStaTabs();
  const el=document.getElementById('cardList');
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-ic">📦</div>还没有快递哦<br><span style="font-size:14px;color:#AEAEB2">点击下方按钮开始识别</span></div>';return;}
  el.innerHTML=f.map(i=>{
    const color=CR[i.courier]||'#BC8F8F';
    const sel=selected.has(i.id);
    return `<div class="cd${i.pickedUp?' picked':''}${sel?' sel':''}" ${selectMode?`onclick="toggleSel(${i.id})"`:''}><div class="cd-hd">${selectMode?`<div class="chk${sel?' on':''}">${sel?'✓':''}</div>`:''}<span class="cd-corp"><span class="badge" style="background:${color}">${i.courier||'快递'}</span> 📍 ${i.station||''}</span><span class="cd-sta">${i.time||''}</span></div><div class="cd-code${i.pickedUp?' picked':''}" onclick="${selectMode?`toggleSel(${i.id})`:`copyCode('${i.code}')`}">${i.code}</div><div class="cd-ft">${i.pickedUp?'':`<button class="btn-pk" onclick="event.stopPropagation();togglePicked(${i.id})">✅ 已取</button>`}<button onclick="event.stopPropagation();shareItem('${i.code.replace(/'/g,"\\'")}','${(i.courier||'').replace(/'/g,"\\'")}','${(i.station||'').replace(/'/g,"\\'")}')">📤</button><button onclick="event.stopPropagation();openModal(${i.id})">编辑</button><button class="del" onclick="event.stopPropagation();deleteItem(${i.id})">删除</button></div></div>`;
  }).join('');
}

function cleanCJK(s){let r=s;for(let i=0;i<5;i++)r=r.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g,'$1$2');for(let i=0;i<3;i++){r=r.replace(/([\dA-Za-z])\s+([\u4e00-\u9fff])/g,'$1$2');r=r.replace(/([\u4e00-\u9fff])\s+([\dA-Za-z])/g,'$1$2');}return r;}

function matchStation(text){
  for(const s of stations){
    if(text.includes(s))return s;
  }
  return'';
}

function parseText(text){
  const lines=text.split(/\n/);
  const ct=cleanCJK(lines.join(' '));
  const cm={极兔:'极兔',极免:'极兔',圆通:'圆通',中通:'中通',韵达:'韵达',申通:'申通',顺丰:'顺丰',京东:'京东',邮政:'邮政EMS',EMS:'邮政EMS',菜鸟:'菜鸟',德邦:'德邦'};
  let cr='';for(const[k,v]of Object.entries(cm)){if(ct.includes(k)){cr=v;break;}}
  let st=matchStation(ct);
  if(!st)for(const s of stations){for(const l of lines){if(l.includes(s)){st=s;break;}}if(st)break;}
  const results=[],seen=new Set();
  for(const m of ct.matchAll(/取件码[：:\s]*([A-Za-z0-9\-—]{2,15})/g)){
    const code=m[1].replace(/[—-]{2,}/g,'-').trim();
    if(code.length>=2&&!seen.has(code)){seen.add(code);results.push({code,courier:cr,station:st});}
  }
  if(!results.length){
    const dc=/\b([A-Z\d]\d{0,2}\-\d{1,3}\-\d{2,4})\b/g;
    let m;while((m=dc.exec(ct))!==null){if(!seen.has(m[1])&&m[1].length>=6){seen.add(m[1]);results.push({code:m[1],courier:cr,station:st});}}
  }
  return results.slice(0,10);
}

function resizeImage(file){return new Promise(r=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>1000){h*=1000/w;w=1000;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cv.toBlob(b=>r(b),'image/jpeg',.7);};img.src=e.target.result;};reader.readAsDataURL(file);});}

async function handleFile(e){const f=e.target.files[0];if(f)await processImage(f);e.target.value='';}

async function processImage(imageFile){
  document.getElementById('ocrLoad').classList.add('show');
  document.getElementById('ocrSt').textContent='正在处理...';
  try{
    if(typeof Tesseract==='undefined'){document.getElementById('ocrSt').textContent='OCR引擎加载失败，请刷新重试';return;}
    let processed=imageFile;try{processed=await resizeImage(imageFile);}catch(e){}
    if(!worker){
      document.getElementById('ocrSt').textContent='首次需下载语言包（约18MB），请稍候...';
      let retries=3;
      while(retries>0){try{worker=await Tesseract.createWorker('chi_sim+eng',1,{logger:m=>{if(m.status==='recognizing text')document.getElementById('ocrSt').textContent='识别中... '+Math.round(m.progress*100)+'%';}});break;}catch(e){retries--;if(retries===0)throw e;document.getElementById('ocrSt').textContent='加载失败，重试('+retries+')...';await new Promise(r=>setTimeout(r,2000));}}
    }
    document.getElementById('ocrSt').textContent='正在识别...';
    const{data:{text}}=await worker.recognize(processed);
    showOcrResults(parseText(text),text);
  }catch(err){document.getElementById('ocrSt').textContent='识别失败: '+err.message;}
}

function showOcrResults(codes,raw){
  document.getElementById('ocrLoad').classList.remove('show');
  if(!codes.length){toast('没有识别到取件码');return;}
  if(codes.length===1){const c=codes[0];openModal();setTimeout(()=>{document.getElementById('iCode').value=c.code;curC=c.courier||'';document.getElementById('iStation').value=c.station||'';renderCrpRow();},50);return;}
  let h='<div style="margin:10px 16px;background:rgba(255,255,255,.9);border-radius:16px;padding:18px;box-shadow:var(--shadow)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:16px;font-weight:700;margin:0">🔍 识别到多个取件码</h3><span onclick="document.getElementById(\'mso\').remove()" style="font-size:14px;color:#FF6B9D;cursor:pointer;font-weight:600">完成</span></div>';
  codes.forEach(c=>{
    const info=[c.courier,c.station].filter(Boolean).join(' · ');
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,107,157,.06);border-radius:10px;margin-bottom:6px"><div><div style="font-size:16px;font-weight:700;color:#FF6B9D">${c.code}</div><div style="font-size:12px;color:#8E8E93;margin-top:2px">${info||'未识别驿站'}</div></div><button onclick="qAdd('${c.code.replace(/'/g,"\\'")}','${(c.courier||'').replace(/'/g,"\\'")}','${(c.station||'').replace(/'/g,"\\'")}');this.textContent='✅ 已添加';this.style.background='#34C759';this.disabled=true;" style="background:linear-gradient(135deg,#FF6B9D,#FF8E53);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation">添加</button></div>`;
  });
  h+='</div>';
  const ov=document.createElement('div');ov.className='mo show';ov.id='mso';ov.innerHTML=h;ov.onclick=e=>{if(e.target===ov)ov.remove();};document.body.appendChild(ov);
}

function qAdd(code,cr,st){
  items.unshift({id:Date.now()+Math.floor(Math.random()*1000),code,courier:cr||'',station:st||'',time:new Date().toLocaleString('zh-CN'),pickedUp:false});
  save();renderCards();toast('✅ 已添加 '+code);
}

function resizeImage(f){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>1000){h*=1000/w;w=1000;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cv.toBlob(b=>r(b),'image/jpeg',.7);};img.src=e.target.result;};rd.readAsDataURL(f);});}

function cancelOCR(){document.getElementById('ocrLoad').classList.remove('show');toast('已取消');}

function openStats(){
  const total=items.length,picked=items.filter(i=>i.pickedUp).length,active=total-picked;
  const today=new Date().toDateString(),tc=items.filter(i=>new Date(i.id).toDateString()===today).length;
  const ss={};items.forEach(i=>{if(i.station)ss[i.station]=(ss[i.station]||0)+1;});
  const top=Object.entries(ss).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('statsCt').innerHTML=`<div class="sgrid"><div class="sc"><div class="n">${total}</div><div class="l">总快递数</div></div><div class="sc"><div class="n">${active}</div><div class="l">待取快递</div></div><div class="sc"><div class="n">${picked}</div><div class="l">已取快递</div></div><div class="sc"><div class="n">${tc}</div><div class="l">今日新增</div></div></div>${top.length?`<div style="font-size:14px;color:#666;font-weight:600;margin-top:10px">📍 驿站包裹排行</div>${top.map(n=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)"><span>📍 ${n[0]}</span><span style="font-weight:bold;color:#FF6B9D">${n[1]}件</span></div>`).join('')}`:''}`;
  document.getElementById('statsMo').classList.add('show');
}
function closeStats(){document.getElementById('statsMo').classList.remove('show');}

function openSettings(){
  document.getElementById('iStas').value=stations.join('\n');
  document.getElementById('setMo').classList.add('show');
}
function closeSettings(){document.getElementById('setMo').classList.remove('show');}
function saveSettings(){
  const stText=document.getElementById('iStas').value.trim();
  stations=stText.split('\n').map(s=>s.trim()).filter(Boolean);
  saveStas();
  closeSettings();toast('已保存');
}

function exportData(){
  const data=JSON.stringify({items,stations,version:2});
  navigator.clipboard.writeText(data).then(()=>toast('数据已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=data;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('数据已复制');});
}
function importData(){
  const text=document.getElementById('iImport').value.trim();
  if(!text)return toast('请先粘贴数据');
  try{
    const data=JSON.parse(text);
    if(!data.items||!Array.isArray(data.items))return toast('格式错误');
    if(!confirm('导入会覆盖当前数据，确定？'))return;
    items=data.items;save();
    if(data.stations&&Array.isArray(data.stations)){stations=data.stations;saveStas();}
    renderCards();closeSettings();toast('导入成功！共'+items.length+'条');
  }catch(e){toast('格式错误');}
}

renderCards();
if(typeof Tesseract==='undefined')setTimeout(()=>toast('⚠️ OCR引擎加载失败，请刷新重试'),1000);
</script>
